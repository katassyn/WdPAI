<header class="topbar">

        <i class="fa-solid fa-bars"></i>
    </button>

    <div class="topbar-search">
        <i class="fa-solid fa-magnifying-glass topbar-search-icon"></i>
        <input type="text" class="topbar-search-input" placeholder="Search recipes, ingredients, or tags...">
    </div>

    <div class="topbar-actions">
        <button class="topbar-notification">
            <i class="fa-regular fa-bell"></i>

        </button>
        <a href="/creator" class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>
            <span>New Recipe</span>
        </a>

</header>
