<script>
// Add ingredient row
document.getElementById('add-ingredient-btn').addEventListener('click', function() {
    const list = document.getElementById('ingredient-list');
    const row = document.createElement('div');
    row.className = 'ingredient-item-form';
    row.innerHTML = `
        <input type="text" name="ingredient_name[]" class="form-input" placeholder="Ingredient name">
        <input type="text" name="ingredient_amount[]" class="form-input form-input-sm" placeholder="Amount">
        <input type="text" name="ingredient_unit[]" class="form-input form-input-sm" placeholder="Unit (g, ml, tsp)">
        <button type="button" class="ingredient-item-remove" onclick="this.parentElement.remove()"><i class="fa-solid fa-xmark"></i></button>
    `;
    list.appendChild(row);
});

// Add cooking step
document.getElementById('add-step-btn').addEventListener('click', function() {
    const list = document.getElementById('steps-list');
    const num = list.querySelectorAll('.cooking-step-card').length + 1;
    const card = document.createElement('div');
    card.className = 'cooking-step-card';
    card.innerHTML = `
        <div class="cooking-step-header">
            <div class="cooking-step-badge">Step ${num}</div>
            <button type="button" class="cooking-step-remove" onclick="this.closest('.cooking-step-card').remove()"><i class="fa-solid fa-trash"></i></button>
        </div>
        <div class="form-group">
            <label class="form-label">Step Title</label>
            <input type="text" name="step_title[]" class="form-input" placeholder="e.g. Cook the main dish">
        </div>
        <div class="form-group">
            <label class="form-label">Instructions</label>
            <textarea name="step_instructions[]" class="form-textarea" placeholder="Describe what to do in this step..."></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Duration (min)</label>
            <div class="input-with-suffix">
                <input type="number" name="step_duration[]" class="form-input" placeholder="5" min="0">
                <span class="input-suffix">m</span>
            </div>
        </div>
    `;
    list.appendChild(card);
});

// Nutrition live preview
document.querySelectorAll('input[name="calories"], input[name="protein"], input[name="carbs"], input[name="fats"], input[name="fiber"], input[name="sugar"]').forEach(function(input) {
    input.addEventListener('input', updateNutritionPreview);
});

function updateNutritionPreview() {
    const cal = parseInt(document.querySelector('input[name="calories"]').value) || 0;
    const pro = parseFloat(document.querySelector('input[name="protein"]').value) || 0;
    const carb = parseFloat(document.querySelector('input[name="carbs"]').value) || 0;
    const fat = parseFloat(document.querySelector('input[name="fats"]').value) || 0;
    const fib = parseFloat(document.querySelector('input[name="fiber"]').value) || 0;
    const sug = parseFloat(document.querySelector('input[name="sugar"]').value) || 0;

    document.getElementById('preview-calories').textContent = cal;
    document.getElementById('preview-protein').textContent = pro + 'g';
    document.getElementById('preview-carbs').textContent = carb + 'g';
    document.getElementById('preview-fats').textContent = fat + 'g';
    document.getElementById('preview-fiber').textContent = fib + 'g';
    document.getElementById('preview-sugar').textContent = sug + 'g';

    document.getElementById('preview-protein-bar').style.width = Math.min(100, (pro / 50) * 100) + '%';
    document.getElementById('preview-carbs-bar').style.width = Math.min(100, (carb / 100) * 100) + '%';
    document.getElementById('preview-fats-bar').style.width = Math.min(100, (fat / 50) * 100) + '%';
}
</script>
